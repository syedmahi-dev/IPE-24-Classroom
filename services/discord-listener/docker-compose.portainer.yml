version: '3.9'

# ── VPS Bot Stack (Portainer-managed) ──────────────────────────────────────
# The web portal runs on Vercel. The database is on Supabase.
# Only Redis + Discord Listener + Telegram Bot run here.

services:
  redis:
    image: redis:7.2-alpine
    container_name: ipe24-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - ipe24-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  discord-listener:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ipe24-discord-listener
    restart: always
    env_file: .env
    ports:
      - "127.0.0.1:3005:3005"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ipe24-net

  telegram-bot:
    build:
      context: ../telegram-bot
      dockerfile: Dockerfile
    container_name: ipe24-telegram-bot
    restart: always
    env_file: ../telegram-bot/.env
    environment:
      - REDIS_URL=redis://redis:6379
    ports:
      - "127.0.0.1:3004:3004"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ipe24-net

networks:
  ipe24-net:
    driver: bridge

volumes:
  redis_data:
